<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f7f7f7;
}

header{
background:#000;
color:white;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;

}

nav a{
color:white;

margin-left:20px;

}

.hero{
height:520px;
display:flex;
justify-content:center;

.hero h1{

}

.hero p{

margin-bottom:30px;
}

.btn{
display:inline-block;
background:#FFD700;
color:#000;
padding:15px 35px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

.categories{
padding:70px 8%;
}

.categories h2{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:60px;
}

</style>
